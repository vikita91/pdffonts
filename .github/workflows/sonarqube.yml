name: SonarQube Analysis

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: sudo bash ./scripts/install-system-dependencies-debian.sh

      - name: Install poppler
        run: sudo bash ./scripts/install-poppler-debian.sh

      - name: Install dependencies
        run: npm install

      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Download SonarCloud build-wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip build-wrapper.zip

      - name: Build with build-wrapper
        run: >
          build-wrapper-linux-x86/build-wrapper-linux-x86-64
          --out-dir bw-output
          node-gyp --debug rebuild

      - name: Run tests
        run: npx mocha test --require test/setup.js --recursive --timeout 30000
        continue-on-error: true

      - name: Generate C++ coverage
        run: npm run cover

      - name: Prepare coverage reports
        run: |
          mkdir -p coverage
          cp coverage.info coverage/lcov.info

      - name: Convert LCOV to SonarCloud generic coverage format
        run: |
          node -e "
            const fs = require('fs');
            const lcov = fs.readFileSync('coverage.info', 'utf8');
            let xml = '<coverage version=\"1\">\n';
            let currentFile = null;
            for (const line of lcov.split('\n')) {
              if (line.startsWith('SF:')) {
                currentFile = line.slice(3);
                xml += '  <file path=\"' + currentFile + '\">\n';
              } else if (line.startsWith('DA:') && currentFile) {
                const parts = line.slice(3).split(',');
                xml += '    <lineToCover lineNumber=\"' + parts[0] + '\" covered=\"' + (parseInt(parts[1]) > 0) + '\"/>\n';
              } else if (line === 'end_of_record' && currentFile) {
                xml += '  </file>\n';
                currentFile = null;
              }
            }
            xml += '</coverage>';
            fs.writeFileSync('coverage-sonar.xml', xml);
            console.log('Generic coverage report written to coverage-sonar.xml');
            console.log(xml);
          "

      - name: Generate HTML coverage report
        run: genhtml coverage.info -o coverage
        continue-on-error: true

      - name: Generate metrics JSON
        run: node scripts/generate-metrics.js

      - name: Post test inventory to summary
        if: always()
        run: |
          if [ -f metrics.json ]; then
            node -e "
              const m = require('./metrics.json');
              const cov = m.coverage && m.coverage.lines && m.coverage.lines.pct != null ? m.coverage.lines.pct + '%' : 'N/A';
              const brCov = m.coverage && m.coverage.branches && m.coverage.branches.pct != null ? m.coverage.branches.pct + '%' : 'N/A';
              const fnCov = m.coverage && m.coverage.functions && m.coverage.functions.pct != null ? m.coverage.functions.pct + '%' : 'N/A';
              let md = '## 📊 Test Inventory & Coverage — ' + m.repository + '\n\n';
              md += '| Metric | Value |\n|---|---|\n';
              md += '| **Repository** | ' + m.repository + ' |\n';
              md += '| **Version** | ' + m.version + ' |\n';
              md += '| **Unit Test Files** | ' + m.tests.unitFiles + ' |\n';
              md += '| **Integration Test Files** | ' + m.tests.integrationFiles + ' |\n';
              md += '| **Total Test Files** | ' + m.tests.totalFiles + ' |\n';
              md += '| **Line Coverage** | ' + cov + ' |\n';
              md += '| **Branch Coverage** | ' + brCov + ' |\n';
              md += '| **Function Coverage** | ' + fnCov + ' |\n\n';
              if (m.tests.unitTestFiles.length > 0) {
                md += '### Unit Tests\n';
                m.tests.unitTestFiles.forEach(f => md += '- \`' + f + '\`\n');
                md += '\n';
              }
              if (m.tests.integrationTestFiles.length > 0) {
                md += '### Integration Tests\n';
                m.tests.integrationTestFiles.forEach(f => md += '- \`' + f + '\`\n');
              }
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
            "
          fi

      - name: Install SonarScanner CLI
        run: |
          export SONAR_SCANNER_VERSION=6.2.1.4610
          curl -sSLo sonar-scanner.zip "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip"
          unzip -q sonar-scanner.zip
          echo "${PWD}/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan
        run: sonar-scanner -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-metrics
          path: metrics.json
          if-no-files-found: ignore

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: coverage/
          if-no-files-found: ignore
